<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>Pomodoro Timer</h1>
    <p class="phase-indicator" id="phaseIndicator">Work Session</p>
    <div class="tomato-timer" id="tomatoTimer" role="img" aria-label="">
      <div class="tomato-3d-scene">
        <div class="tomato-3d-rot" id="tomatoBody">
          <svg viewBox="0 0 200 200" class="tomato-svg">
            <defs>
              <radialGradient id="tomatoGrad" cx="35%" cy="25%" r="70%">
                <stop offset="0%" style="stop-color:#ff8a80"/>
                <stop offset="40%" style="stop-color:#e63946"/>
                <stop offset="100%" style="stop-color:#b71c1c"/>
              </radialGradient>
              <radialGradient id="tomatoHighlight" cx="30%" cy="20%" r="40%">
                <stop offset="0%" style="stop-color:rgba(255,255,255,0.5)"/>
                <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
              </radialGradient>
              <linearGradient id="stemGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#2d6a4f"/>
                <stop offset="100%" style="stop-color:#1b4332"/>
              </linearGradient>
            </defs>
            <g class="tomato-core">
              <circle cx="100" cy="100" r="70" fill="url(#tomatoGrad)" stroke="#8b0000" stroke-width="2"/>
              <circle cx="100" cy="100" r="70" fill="url(#tomatoHighlight)"/>
              <ellipse cx="85" cy="75" rx="8" ry="6" fill="rgba(255,255,255,0.4)"/>
              <path d="M95 35 L100 25 L105 35 L100 42 Z" fill="url(#stemGrad)" stroke="#1b4332" stroke-width="2"/>
              <ellipse cx="92" cy="38" rx="3" ry="5" fill="#40916c"/>
              <ellipse cx="108" cy="38" rx="3" ry="5" fill="#40916c"/>
            </g>
            <g class="tomato-notches">
              <!-- 60 notches around circumference, one per minute -->
            </g>
          </svg>
        </div>
      </div>
    </div>
    <div class="controls">
      <button type="button" class="btn btn-primary" id="startPauseBtn">Start</button>
      <button type="button" class="btn btn-secondary" id="resetBtn">Reset</button>
    </div>
    <div class="stats">
      <span>Sessions completed: </span>
      <span id="sessionCount">0</span>
    </div>
    <button type="button" class="btn btn-link" id="resetSessionsBtn">Reset session count</button>
  </main>
  <script src="app.js"></script>
</body>
</html>
