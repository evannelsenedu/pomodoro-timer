<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; base-uri 'self'; form-action 'self'; frame-ancestors 'none'">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>POMMO</title>
  <link rel="icon" href="pommo-logo.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- First-boot duration picker -->
  <div class="duration-picker-overlay" id="durationPickerOverlay">
    <div class="duration-picker" role="dialog" aria-labelledby="durationPickerTitle">
      <h2 id="durationPickerTitle" class="duration-picker-title">Choose your work session length</h2>
      <div class="duration-options">
        <button type="button" class="btn btn-duration" data-minutes="30">30 min</button>
        <button type="button" class="btn btn-duration" data-minutes="45">45 min</button>
        <button type="button" class="btn btn-duration" data-minutes="60">60 min</button>
        <button type="button" class="btn btn-duration" data-minutes="75">75 min</button>
        <button type="button" class="btn btn-duration" data-minutes="90">90 min</button>
      </div>
    </div>
  </div>
  <div class="progress-circles" id="progressCircles" aria-label="Session progress">
    <div class="circle" data-index="0"></div>
    <div class="circle" data-index="1"></div>
    <div class="circle" data-index="2"></div>
    <div class="circle" data-index="3"></div>
    <div class="circle" data-index="4"></div>
    <div class="circle" data-index="5"></div>
  </div>
  <main class="container">
    <h1 class="title">Pomodoro Timer</h1>
    <p class="quote">Do it for <select class="quote-select" id="quoteSelect" aria-label="Select who to do it for"><option value="" selected></option><option value="Lola">Lola</option></select></p>
    <div class="tomato-logo" role="img" aria-label="Tomato timer logo">
      <img src="pommo-logo.png" alt="" class="tomato-image">
      <div class="timer-content">
        <div class="timer-display" id="timerDisplay">60:00</div>
      </div>
    </div>
    <div class="controls">
      <button type="button" class="btn btn-primary" id="startPauseBtn">Start</button>
      <button type="button" class="btn btn-secondary" id="resetBtn">Reset</button>
      <button type="button" class="btn btn-secondary btn-skip-break" id="skipBreakBtn" aria-label="Skip break and start next work session">Skip Break</button>
    </div>
    <div class="stats">
      <span>Today: </span><span id="timeToday">0:00</span>
      <span> | This week: </span><span id="timeWeek">0:00</span>
      <span> | This year: </span><span id="timeYear">0:00</span>
      <span> | All time: </span><span id="timeTotal">0:00</span>
    </div>
    <button type="button" class="btn btn-link" id="resetSessionsBtn">Reset time stats</button>
    <button type="button" class="btn btn-link" id="changeDurationBtn">Change duration</button>
  </main>
  <!-- Modal for break/work prompts -->
  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-labelledby="modalTitle" aria-describedby="modalMessage">
      <h2 id="modalTitle" class="modal-title"></h2>
      <p id="modalMessage" class="modal-message"></p>
      <div class="modal-buttons">
        <button type="button" class="btn btn-primary modal-btn" id="modalApproveBtn">Start</button>
        <button type="button" class="btn btn-secondary modal-btn modal-skip-btn" id="modalSkipBreakBtn" style="display: none;">Skip Break</button>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js" integrity="sha384-Rv68Y7adOjMMJc1/xFMcdNvXre/HF51to4GZjBALmXr7ABnVl5V4UajJwBu7zbhN" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
